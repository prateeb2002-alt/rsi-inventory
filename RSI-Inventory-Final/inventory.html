<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSI Inventory — Inventory</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/app.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<!-- SPINNER OVERLAY (shown during server calls) -->
<div id="spinner" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div style="width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;"></div>
  <p id="spinnerMsg" style="color:#fff;font-size:15px;font-weight:600;margin:0;">Please wait…</p>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <svg width="26" height="26" viewBox="0 0 38 38" fill="none">
      <rect width="38" height="38" rx="9" fill="#1a5c3a"/>
      <path d="M19 7L31 13.5V24.5L19 31L7 24.5V13.5L19 7Z" stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>
      <path d="M19 7v24M7 13.5h24M7 24.5h24" stroke="white" stroke-width="1.4" opacity=".4"/>
    </svg>
    RSI Inventory
  </div>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="inventory.html" class="nav-link active">Inventory</a>
  </div>
  <div class="nav-user">
    <span class="nav-user-name" id="userGreeting"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="page-header">
    <div>
      <h1>Inventory</h1>
      <p>Manage all your warehouse and lab items.</p>
    </div>
    <button class="btn-add" onclick="openAdd()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Item
    </button>
  </div>

  <div class="table-wrap">
    <table class="inv-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Location</th>
          <th>Quantity</th>
          <th>Threshold</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="itemsBody">
        <tr><td colspan="5" class="tbl-empty"><div style="font-size:2rem;margin-bottom:.5rem">⏳</div>Loading items…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- ADD / EDIT MODAL -->
<div id="itemModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle">Add New Item</h2>
      <button class="modal-close" onclick="_closeModal('itemModal')">✕</button>
    </div>
    <div class="form-group">
      <label>Photo</label>
      <div class="photo-btns">
        <button type="button" class="btn-photo" onclick="document.getElementById('photoInput').click()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Camera
        </button>
        <button type="button" class="btn-photo" onclick="document.getElementById('photoInput').click()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Gallery
        </button>
      </div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)"/>
      <img id="photoPreview" class="photo-preview" src="" alt="Preview" style="display:none"/>
    </div>
    <div class="form-group">
      <label for="itemName">Item Name <span style="color:var(--red)">*</span></label>
      <input type="text" id="itemName" placeholder="E.g. Safety Goggles"/>
    </div>
    <div class="form-group">
      <label for="itemLocation">Location <span style="color:var(--red)">*</span></label>
      <input type="text" id="itemLocation" placeholder="E.g. Shelf A2"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="itemQty">Quantity</label>
        <input type="number" id="itemQty" value="0" min="0"/>
      </div>
      <div class="form-group">
        <label for="itemThreshold">Low Stock Threshold</label>
        <input type="number" id="itemThreshold" value="5" min="0"/>
      </div>
    </div>
    <div class="form-group">
      <label for="itemDesc">Description</label>
      <textarea id="itemDesc" placeholder="Optional details…" rows="3" style="resize:vertical"></textarea>
    </div>
    <div id="modalError" class="modal-error" style="display:none"></div>
    <div class="modal-footer">
      <button type="button" class="btn-cancel" onclick="_closeModal('itemModal')">Cancel</button>
      <button type="button" class="btn-primary" id="saveBtn" onclick="saveItem()">Create Item</button>
    </div>
  </div>
</div>

<!-- QR CODE MODAL -->
<div id="qrModal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h2>Item QR Code</h2>
      <button class="modal-close" onclick="_closeModal('qrModal')">✕</button>
    </div>
    <p id="qrItemName"     style="font-weight:700;font-size:16px;text-align:center;margin-bottom:4px"></p>
    <p id="qrItemLocation" style="color:var(--g400);font-size:13px;text-align:center;margin-bottom:16px"></p>
    <div class="qr-wrap"><div id="qrCodeDiv"></div></div>
    <p style="text-align:center;font-size:12px;color:var(--g400);margin-bottom:4px">Scan to open and edit this item</p>
    <div class="modal-footer" style="justify-content:center">
      <button type="button" class="btn-primary" style="width:auto;padding:10px 28px" onclick="downloadQr()">⬇ Download QR</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="js/api.js"></script>
<script src="js/app-auth.js"></script>
<script src="js/inventory.js"></script>
</body>
</html>
