<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSI Inventory — Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <svg width="26" height="26" viewBox="0 0 38 38" fill="none">
      <rect width="38" height="38" rx="9" fill="#1a5c3a"/>
      <path d="M19 7L31 13.5V24.5L19 31L7 24.5V13.5L19 7Z" stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>
      <path d="M19 7v24M7 13.5h24M7 24.5h24" stroke="white" stroke-width="1.4" opacity=".4"/>
    </svg>
    RSI Inventory
  </div>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link active">Dashboard</a>
    <a href="inventory.html" class="nav-link">Inventory</a>
  </div>
  <div class="nav-user">
    <span class="nav-user-name" id="userGreeting"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main">

  <div class="page-header">
    <div>
      <h1>Dashboard</h1>
      <p>Overview of your inventory status.</p>
    </div>
  </div>

  <!-- STAT CARDS -->
  <div class="stats-grid">

    <div class="stat-card">
      <div class="stat-label">
        Total Items
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
      </div>
      <div class="stat-value" id="statTotal">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">
        Low Stock Items
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.5">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="stat-value orange" id="statLowStock">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">
        Total Quantity
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <div class="stat-value" id="statQty">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">
        Recently Added
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="stat-value" id="statRecent">0</div>
    </div>

  </div>

  <!-- PANELS -->
  <div class="panels-grid">

    <div class="panel">
      <h3>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        </svg>
        Low Stock Alerts
      </h3>
      <div id="lowStockList" class="panel-empty">Loading…</div>
    </div>

    <div class="panel">
      <h3>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Recently Added
      </h3>
      <div id="recentAddedList" class="panel-empty">Loading…</div>
    </div>

    <div class="panel">
      <h3>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Recently Edited
      </h3>
      <div id="recentEditedList" class="panel-empty">Loading…</div>
    </div>

  </div>

</main>

<!--
  SCRIPT ORDER — IMPORTANT:
  1. api.js      → data functions
  2. app-auth.js → requireAuth() + logout() for protected pages
  3. dashboard.js → page logic (calls requireAuth at the top)

  auth.js is NOT loaded here. auth.js is only for index.html.
-->
<script src="js/api.js"></script>
<script src="js/app-auth.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
